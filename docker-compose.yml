# Anvesha AI — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  # ── SearxNG Search Engine ────────────────────────────────────
  searxng:
    container_name: anvesha-searxng
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-anvesha_prod_secret}
    restart: unless-stopped
    networks:
      - anvesha-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    container_name: anvesha-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - FRONTEND_URL=http://frontend:3000
    depends_on:
      - searxng
    restart: unless-stopped
    networks:
      - anvesha-net

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    container_name: anvesha-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - anvesha-net

networks:
  anvesha-net:
    driver: bridge
